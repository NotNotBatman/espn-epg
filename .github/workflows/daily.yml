name: Daily EPG Update

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pytz python-dateutil

      - name: Generate EPG
        run: python epg_generator.py

      - name: Commit and push EPG
        run: |
          git config user.name "EPG Bot"
          git config user.email "epgbot@users.noreply.github.com"
          git add epg.xml
          git diff --cached --quiet || git commit -m "EPG update $(date +'%Y-%m-%d')"
          git push
